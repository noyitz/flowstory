<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World — FlowStory</title>
<link rel="stylesheet" href="../../templates/style.css">
</head>
<body>

<button class="fs-theme-toggle" id="fs-theme">&#9790;</button>

<div class="fs-brand" id="fs-brand"></div>
<div class="fs-title" id="fs-title"></div>

<div class="fs-panel">
  <div class="fs-flow-bar">
    <select id="fs-flow-select"></select>
    <button class="fs-start" id="fs-play">&#9654; Start</button>
    <button id="fs-speed">1x</button>
    <button id="fs-loop" style="border-color:#79c0ff;color:#79c0ff">&#8635; Loop</button>
    <button class="fs-reset" id="fs-reset">Reset</button>
  </div>
  <div class="fs-steps" id="fs-steps">
    <div class="fs-steps-title">Flow Steps <span style="font-weight:400;font-size:11px;color:var(--fs-text-dim)">· click to jump</span></div>
    <div id="fs-steps-container"></div>
  </div>
  <div class="fs-inspector" id="fs-inspector">
    <div class="fs-inspector-title" id="fs-inspector-title" style="color:var(--fs-accent)">Request</div>
    <div id="fs-inspector-content"></div>
  </div>
</div>

<div id="fs-highlight-box" style="display:none;position:fixed;z-index:350;border-radius:10px;pointer-events:none"></div>
<div id="fs-overlay" style="display:none;position:fixed;top:0;left:0;right:380px;bottom:0;z-index:300;background:rgba(0,0,0,0.6)">
  <div id="fs-overlay-card" style="position:absolute;background:#161b22ee;border:1px solid #30363d;border-radius:14px;max-width:420px;padding:22px 26px;box-shadow:0 12px 40px rgba(0,0,0,0.5)">
    <button id="fs-overlay-close" style="position:absolute;top:10px;right:14px;background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px">✕</button>
    <div id="fs-overlay-accent" style="width:4px;height:24px;border-radius:2px;position:absolute;left:0;top:22px"></div>
    <h2 id="fs-overlay-title" style="margin:0 0 6px;font-size:18px;color:#c9d1d9;font-family:system-ui"></h2>
    <p id="fs-overlay-desc" style="margin:0 0 14px;font-size:13px;color:#8b949e;line-height:1.5;font-family:system-ui"></p>
    <div id="fs-overlay-details" style="font-size:12px;font-family:'SF Mono',Menlo,monospace"></div>
    <button id="fs-overlay-resume" style="margin-top:14px;padding:7px 20px;border:1px solid #3fb950;border-radius:8px;background:transparent;color:#3fb950;font-size:13px;cursor:pointer;font-family:system-ui">&#9654; Resume Flow</button>
  </div>
</div>

<div class="fs-legend" id="fs-legend"></div>

<canvas id="fs-canvas"></canvas>

<script type="module">
import { FlowStory } from '../../src/index.js';

const viz = new FlowStory(document.getElementById('fs-canvas'), {
  stepsContainer: document.getElementById('fs-steps-container'),
  inspectorTitle: document.getElementById('fs-inspector-title'),
  inspectorContent: document.getElementById('fs-inspector-content'),
  overlay: document.getElementById('fs-overlay'),
  overlayCard: document.getElementById('fs-overlay-card'),
  overlayTitle: document.getElementById('fs-overlay-title'),
  overlayDesc: document.getElementById('fs-overlay-desc'),
  overlayDetails: document.getElementById('fs-overlay-details'),
  overlayAccent: document.getElementById('fs-overlay-accent'),
  overlayClose: document.getElementById('fs-overlay-close'),
  overlayResume: document.getElementById('fs-overlay-resume'),
  highlightBox: document.getElementById('fs-highlight-box'),
  brand: document.getElementById('fs-brand'),
  title: document.getElementById('fs-title'),
  legend: document.getElementById('fs-legend'),
  flowSelect: document.getElementById('fs-flow-select'),
  playBtn: document.getElementById('fs-play'),
  speedBtn: document.getElementById('fs-speed'),
  loopBtn: document.getElementById('fs-loop'),
  resetBtn: document.getElementById('fs-reset'),
  themeBtn: document.getElementById('fs-theme'),
});

window.__flowstory = viz;

try {
  await viz.load('./diagram.json');

  // Auto-play with loop on page load
  viz.state.loopMode = true;
  const loopBtn = document.getElementById('fs-loop');
  if (loopBtn) {
    loopBtn.textContent = '⟳ Loop ON';
    loopBtn.style.borderColor = '#3fb950';
    loopBtn.style.color = '#3fb950';
  }
  viz.play();
} catch (e) {
  console.error('FlowStory load error:', e);
  document.body.innerHTML = `<div style="padding:40px;color:#f85149;font-family:monospace"><h2>FlowStory Load Error</h2><pre>${e.message}\n\n${e.stack || ''}</pre></div>`;
}
</script>
</body>
</html>
