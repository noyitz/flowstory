</div>

<div id="fs-highlight-box" style="display:none;position:fixed;z-index:350;border-radius:10px;pointer-events:none"></div>

</div>

<script type="module">
import { FlowStory } from 'https://noyitz.github.io/flowstory/src/index.js';

const diagram = {

    "brandColor": "#ee0000"
  },
  "canvas": { "w": 1250, "h": 1000 },
  "flowOrder": ["oidc", "rbac", "signout", "session_expiry"],
  "defaultFlow": "oidc",

  "nodes": {
    "user": {
      "x": -70, "y": 370, "w": 90, "h": 110,
      "type": "icon",
      "label": "User Browser",
      "color": "#58a6ff"
    },
    "cluster": {
      "x": 85, "y": 25, "w": 730, "h": 880,

      "label": "OpenShift Cluster",
      "color": "#30363d"
    },
    "envoy": {
      "x": 150, "y": 90, "w": 260, "h": 65,
      "label": "Istio Gateway (Envoy)",
      "sublabel": "443/TCP · TLS 1.3 · ext_authz filter",
      "color": "#8b949e"
    },
    "upstream": {
      "x": 530, "y": 90, "w": 250, "h": 65,
      "label": "Upstream Application",
      "sublabel": "Dashboard · Notebooks · KServe",
      "color": "#3fb950"
    },
    "auth-proxy": {
      "x": 150, "y": 350, "w": 260, "h": 65,
      "label": "kube-auth-proxy",
      "sublabel": "4180/TCP · OIDC + OAuth · FIPS",
      "color": "#f0883e"
    },
    "k8s-api": {
      "x": 530, "y": 350, "w": 250, "h": 65,
      "label": "Kubernetes API Server",
      "sublabel": "TokenReview · SubjectAccessReview",
      "color": "#58a6ff"
    },
    "rbac-proxy": {
      "x": 150, "y": 610, "w": 260, "h": 65,
      "label": "kube-rbac-proxy",
      "sublabel": "8443/TCP · TLS 1.2+ · 3-tier RBAC",
      "color": "#f0883e"
    },
    "redis": {
      "x": 530, "y": 610, "w": 250, "h": 65,
      "label": "Redis (Optional)",
      "sublabel": "6379/TCP · AES-GCM · Distributed Lock",
      "color": "#8b949e"
    },
    "oidc": {
      "x": 920, "y": 280, "w": 220, "h": 65,

      "color": "#d2a8ff"
    }
  },

  "flows": {
    "oidc": {
      "title": "OIDC Authentication (Happy Path)",
      "steps": [
        {
          "from": "user", "to": "auth-proxy",
          "fromRight": true, "toLeft": true,
          "label": "1", "text": "GET /oauth2/start — initiate OIDC login flow",
          "color": "#f0883e"
        },
        {
          "from": "auth-proxy", "to": "oidc",
          "fromRight": true, "toLeft": true,
          "label": "2", "text": "302 Redirect to authorization endpoint (client_id + redirect_uri)",
          "color": "#f0883e"
        },
        {
          "target": "oidc",
          "badge": "3",
          "text": "User authenticates with IdP (credentials, MFA)"
        },
        {
          "from": "oidc", "to": "auth-proxy",
          "fromLeft": true, "toRight": true,
          "yOff": 15,
          "label": "4", "text": "GET /oauth2/callback?code=<authorization_code>",
          "color": "#d2a8ff"
        },
        {
          "from": "auth-proxy", "to": "oidc",
          "fromRight": true, "toLeft": true,
          "yOff": 15,
          "label": "5", "text": "POST /token — exchange code + client credentials for tokens",
          "color": "#f0883e"
        },
        {
          "target": "auth-proxy",
          "badge": "6",
          "text": "Session created — AES-CFB encrypted cookie + HMAC-SHA256 signature"
        },
        {
          "from": "auth-proxy", "to": "upstream",
          "fromTop": true, "toBottom": true,
          "fromXOff": 60, "toXOff": -30,
          "label": "7", "text": "Forward request + X-Auth-Request-User/Groups headers",
          "color": "#58a6ff"
        },
        {
          "from": "upstream", "to": "user",
          "fromLeft": true, "toRight": true,
          "waypoints": [{"x": 20, "y": 122}],
          "label": "8", "text": "200 OK + Set-Cookie: _oauth2_proxy=<encrypted>; HttpOnly; Secure",
          "color": "#3fb950"
        }
      ]
    },

    "rbac": {
      "title": "Kubernetes RBAC Authorization",
      "steps": [
        {
          "from": "user", "to": "rbac-proxy",
          "fromRight": true, "toLeft": true,
          "label": "1", "text": "HTTPS request with Bearer ServiceAccount token",
          "color": "#58a6ff"
        },
        {
          "from": "rbac-proxy", "to": "k8s-api",
          "fromRight": true, "toLeft": true,
          "yOff": -10,
          "label": "2", "text": "TokenReview — validate bearer token via K8s API",
          "color": "#58a6ff"
        },
        {
          "from": "k8s-api", "to": "rbac-proxy",
          "fromLeft": true, "toRight": true,
          "yOff": 10,
          "label": "3", "text": "Authenticated: user identity + groups confirmed",
          "color": "#3fb950"
        },
        {
          "target": "rbac-proxy",
          "badge": "4",
          "text": "Tier 1: Hardcoded check (prometheus-k8s → /metrics always allowed)"
        },
        {
          "from": "rbac-proxy", "to": "k8s-api",
          "fromRight": true, "toLeft": true,
          "yOff": 10,
          "label": "5", "text": "Tier 3: SubjectAccessReview — verb, resource, namespace",
          "color": "#58a6ff"
        },
        {
          "from": "k8s-api", "to": "rbac-proxy",
          "fromLeft": true, "toRight": true,
          "yOff": -10,
          "label": "6", "text": "Allowed — RBAC role binding matches",
          "color": "#3fb950"
        },
        {
          "from": "rbac-proxy", "to": "upstream",
          "fromRight": true, "toLeft": true,
          "waypoints": [{"x": 470, "y": 642}, {"x": 470, "y": 122}],
          "label": "7", "text": "Forward + x-remote-user / x-remote-groups headers",
          "color": "#58a6ff"
        },
        {
          "from": "upstream", "to": "user",
          "fromLeft": true, "toRight": true,
          "waypoints": [{"x": 20, "y": 122}],
          "label": "8", "text": "200 OK — authorized response",
          "color": "#3fb950"
        }
      ]
    },

    "signout": {
      "title": "Sign-Out Flow",
      "steps": [
        {
          "from": "user", "to": "auth-proxy",
          "fromRight": true, "toLeft": true,
          "label": "1", "text": "GET /oauth2/sign_out (session cookie attached)",
          "color": "#f0883e"
        },
        {
          "target": "auth-proxy",
          "badge": "2",
          "text": "Validate session cookie — decrypt and extract access token"
        },
        {
          "from": "auth-proxy", "to": "k8s-api",
          "fromRight": true, "toLeft": true,
          "label": "3", "text": "DELETE /apis/oauth.openshift.io/v1/oauthaccesstokens/sha256~...",
          "color": "#f85149"
        },
        {
          "from": "k8s-api", "to": "auth-proxy",
          "fromLeft": true, "toRight": true,
          "yOff": 15,
          "label": "4", "text": "200 OK — OAuthAccessToken revoked at OAuth server",
          "color": "#3fb950"
        },
        {
          "target": "auth-proxy",
          "badge": "!",
          "errColor": "#f85149",
          "text": "Session destroyed — cookie cleared, token revoked"
        },
        {
          "from": "auth-proxy", "to": "user",
          "fromLeft": true, "toRight": true,
          "label": "6", "text": "302 Redirect → /oauth2/sign_in + Set-Cookie: Max-Age=0",
          "color": "#f0883e"
        }
      ]
    },

    "session_expiry": {
      "title": "Session Expiry / 401 Error",
      "steps": [
        {
          "from": "user", "to": "envoy",
          "fromRight": true, "toLeft": true,
          "yOff": 10,
          "label": "1", "text": "HTTPS request with expired or missing session cookie",
          "color": "#58a6ff"
        },
        {
          "from": "envoy", "to": "auth-proxy",
          "fromBottom": true, "toTop": true,
          "fromXOff": -30,
          "label": "2", "text": "ext_authz subrequest: GET /oauth2/auth (forwarded headers)",
          "color": "#58a6ff"
        },
        {
          "target": "auth-proxy",
          "badge": "!",
          "errColor": "#f85149",
          "text": "Middleware chain: cookie expired, no refresh token or refresh failed"
        },
        {
          "from": "auth-proxy", "to": "envoy",
          "fromTop": true, "toBottom": true,
          "fromXOff": 30,
          "label": "4", "text": "401 Unauthorized — session invalid",
          "color": "#f85149"
        },
        {
          "from": "envoy", "to": "user",
          "fromLeft": true, "toRight": true,
          "yOff": -10,
          "label": "5", "text": "302 Redirect → /oauth2/sign_in?rd=<original_path>",
          "color": "#f85149"
        }
      ]
    }
  },

  "inspector": {
    "initialState": {
      "headers": [
        {"id": "method", "text": "GET / HTTP/1.1", "style": "keep"},
        {"id": "host", "text": "Host: dashboard.rhoai.example.com", "style": "keep"},

        {"id": "cookie", "text": "Cookie: (none)", "style": "keep"}
      ],
      "body": []
    },
    "mutations": {
      "oidc": [
        {
          "step": 1, "phase": "request",
          "actions": [
            {"id": "method", "text": "GET /oauth2/start HTTP/1.1", "style": "highlight"},

          ]
        },
        {

            "replaceHeaders",

            {"id": "location", "text": "Location: https://idp.example/authorize?client_id=rhoai&scope=openid+email&redirect_uri=...", "style": "add"}
          ]
        },
        {
          "step": 4, "phase": "request",
          "actions": [
            "replaceHeaders",
            {"id": "method", "text": "GET /oauth2/callback?code=abc123 HTTP/1.1", "style": "highlight"},
            {"id": "host", "text": "Host: dashboard.rhoai.example.com", "style": "keep"}
          ]
        },
        {

        {

            {"id": "session", "text": "Session: AES-CFB encrypted + HMAC-SHA256 signed", "style": "add"}
          ]
        },
        {
          "step": 7, "phase": "request",
          "actions": [
            "replaceHeaders",
            {"id": "method", "text": "GET / HTTP/1.1", "style": "keep"},
            {"id": "host", "text": "Host: dashboard-svc.ns.svc", "style": "keep"},
            {"id": "xuser", "text": "X-Auth-Request-User: user@example.com", "style": "add"},
            {"id": "xgroups", "text": "X-Auth-Request-Groups: system:authenticated", "style": "add"},

      ],
      "rbac": [
        {

          "actions": [
            {"id": "method", "text": "GET /api/v1/namespaces/ns/pods HTTP/1.1", "style": "highlight"},

        {
          "step": 2, "phase": "request",

            "replaceHeaders",

        {

            "replaceHeaders",

        {

            {"id": "tier2", "text": "Tier 2 (static rules): not matched", "style": "keep"},

        {

        {
          "step": 6, "phase": "response",
          "actions": [
            "replaceHeaders",
            {"id": "allowed", "text": "status.allowed: true", "style": "add"},
            {"id": "reason", "text": "status.reason: RBAC — ClusterRoleBinding matches", "style": "add"}
          ]
        },
        {
          "step": 7, "phase": "request",
          "actions": [
            "replaceHeaders",
            {"id": "method", "text": "GET /api/v1/namespaces/ns/pods HTTP/1.1", "style": "keep"},
            {"id": "xuser", "text": "X-Remote-User: system:serviceaccount:ns:sa-name", "style": "add"},
            {"id": "xgroups", "text": "X-Remote-Groups: system:serviceaccounts", "style": "add"}
          ]

        {
          "step": 8, "phase": "response",
          "actions": [

            {"id": "status", "text": "200 OK", "style": "highlight"}
          ]

      ],
      "signout": [
        {

          "actions": [
            {"id": "method", "text": "GET /oauth2/sign_out HTTP/1.1", "style": "highlight"},

        {
          "step": 2, "phase": "response",

            "replaceHeaders",

            "replaceHeaders",

        {
          "step": 4, "phase": "response",
          "actions": [

          ]
        },
        {
          "step": 5, "phase": "response",
          "actions": [
            "replaceHeaders",
            {"id": "status", "text": "302 Found", "style": "err"},
            {"id": "location", "text": "Location: /oauth2/sign_in?rd=%2Fdashboard", "style": "add"},
            {"id": "note", "text": "Original path preserved for post-login redirect", "style": "add"}
          ]
        }
      ]
    }
  },

  "tooltips": {
    "envoy": {
      "title": "Istio Gateway (Envoy Proxy)",
      "description": "TLS-terminating reverse proxy at the cluster edge. Routes HTTPRoute CRs to backend services. Queries kube-auth-proxy via ext_authz filter before forwarding requests to upstream. Returns 202 (proceed) or 401 (redirect to login).",
      "details": {
        "Port": "443/TCP HTTPS (TLS 1.3)",
        "Protocol": "ext_authz → subrequest to /oauth2/auth",
        "Auth Check": "202 Accepted = pass, 401 = redirect",
        "TLS": "Terminates external TLS, re-encrypts to backends"
      }
    },
    "auth-proxy": {
      "title": "kube-auth-proxy",
      "description": "FIPS-compliant (strictfipsruntime) authentication proxy deployed as an operator-managed sidecar. Implements a layered middleware pipeline: scope injection → health checks → metrics → session loading (K8s token → OAuth bearer → JWT → basic auth → session cookie) → header injection → upstream proxy.",
